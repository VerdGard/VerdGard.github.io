<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站配置管理面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        label .required {
            color: #e74c3c;
            margin-left: 4px;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .token-input {
            background: #f8f9fa;
            font-family: monospace;
        }
        
        .token-status {
            font-size: 12px;
            margin-top: 5px;
            color: #28a745;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid #dc3545;
            color: #dc3545;
        }
        
        .btn-outline:hover {
            background: #dc3545;
            color: white;
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        
        .status.show {
            display: block;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .preview {
            background: #f8f9fa;
            border: 1px solid #e1e5e9;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .preview h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #667eea;
        }
        
        .preview-content {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
        
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #e1e5e9;
        }
        
        .info-text {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        @media (max-width: 600px) {
            .content {
                padding: 20px;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ 网站配置管理面板</h1>
            <p>自动读取配置，安全修改 control.json（已修复中文乱码）</p>
        </div>
        
        <div class="content">
            <!-- Token 输入区域 -->
            <div class="form-group">
                <label>GitHub Token <span class="required">*</span></label>
                <input type="password" id="token" class="token-input" placeholder="输入你的 GitHub Personal Access Token">
                <div id="tokenStatus" class="token-status"></div>
                <div class="info-text">
                    Token 仅用于本次操作。保存后会自动记住（关闭浏览器后清除），确保下次自动加载。
                    <button type="button" onclick="clearToken()" style="background:none; border:none; color:#dc3545; cursor:pointer; text-decoration:underline; padding:0; margin-left:8px;">清除 Token</button>
                </div>
            </div>
            
            <!-- 版本信息 -->
            <div class="form-group">
                <label>📌 更新版本 <span class="required">*</span></label>
                <input type="text" id="version" placeholder="例如: v2.0.0 或 2024.01.15">
            </div>
            
            <!-- 更新链接 -->
            <div class="form-group">
                <label>🔗 更新链接 <span class="required">*</span></label>
                <input type="url" id="downloadUrl" placeholder="https://example.com/download/latest">
                <div class="info-text">用户点击更新时跳转的链接地址</div>
            </div>
            
            <!-- 更新内容 -->
            <div class="form-group">
                <label>📝 更新内容 <span class="required">*</span></label>
                <textarea id="updateContent" placeholder="1. 新增某某功能&#10;2. 修复已知问题&#10;3. 优化用户体验"></textarea>
                <div class="info-text">支持换行，每行一条更新说明</div>
            </div>
            
            <!-- 公告 -->
            <div class="form-group">
                <label>📢 公告 <span class="required">*</span></label>
                <textarea id="announcement" placeholder="系统将于今晚 23:00 进行维护，预计持续 2 小时"></textarea>
                <div class="info-text">显示在网站顶部的公告信息</div>
            </div>
            
            <!-- 实时预览 -->
            <div class="preview">
                <h3>📋 JSON 预览</h3>
                <div class="preview-content" id="preview"></div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="button-group">
                <button class="btn-secondary" onclick="loadConfig(true)">📂 手动刷新</button>
                <button class="btn-primary" onclick="saveConfig()">💾 保存配置</button>
            </div>
            
            <!-- 状态提示 -->
            <div id="status" class="status"></div>
        </div>
    </div>

    <script>
        // ==================== 配置信息（请根据实际情况修改） ====================
        const REPO_OWNER = 'VerdGard';           // GitHub 用户名
        const REPO_NAME = 'VerdGard.github.io';  // 仓库名
        const FILE_PATH = 'control.json';        // 配置文件路径
        const BRANCH = 'main';                   // 分支名，如 master 或 main
        
        let currentSha = null;                   // 文件的 SHA 值，用于更新
        
        // ==================== UTF-8 与 Base64 转换（修复中文乱码） ====================
        // UTF-8 字符串 → Base64
        function utf8ToBase64(str) {
            return btoa(unescape(encodeURIComponent(str)));
        }
        
        // Base64 → UTF-8 字符串
        function base64ToUtf8(base64) {
            return decodeURIComponent(escape(atob(base64)));
        }
        
        // ==================== Token 存储相关 ====================
        function saveTokenToSession(token) {
            if (token) {
                sessionStorage.setItem('github_token', token);
                document.getElementById('tokenStatus').innerHTML = '✓ Token 已保存（关闭浏览器后自动清除）';
                document.getElementById('tokenStatus').style.color = '#28a745';
            } else {
                sessionStorage.removeItem('github_token');
                document.getElementById('tokenStatus').innerHTML = '';
            }
        }
        
        function getStoredToken() {
            return sessionStorage.getItem('github_token') || '';
        }
        
        function clearToken() {
            sessionStorage.removeItem('github_token');
            document.getElementById('token').value = '';
            document.getElementById('tokenStatus').innerHTML = '✓ Token 已清除';
            document.getElementById('tokenStatus').style.color = '#dc3545';
            showStatus('Token 已清除，下次需要重新输入', 'info');
        }
        
        // ==================== 表单数据处理 ====================
        function getFormData() {
            return {
                version: document.getElementById('version').value.trim(),
                downloadUrl: document.getElementById('downloadUrl').value.trim(),
                updateContent: document.getElementById('updateContent').value.trim(),
                announcement: document.getElementById('announcement').value.trim()
            };
        }
        
        function setFormData(data) {
            document.getElementById('version').value = data.version || '';
            document.getElementById('downloadUrl').value = data.downloadUrl || '';
            document.getElementById('updateContent').value = data.updateContent || '';
            document.getElementById('announcement').value = data.announcement || '';
            updatePreview();
        }
        
        // 更新 JSON 预览
        function updatePreview() {
            const data = getFormData();
            const jsonData = {
                version: data.version,
                downloadUrl: data.downloadUrl,
                updateContent: data.updateContent.split('\n').filter(line => line.trim()),
                announcement: data.announcement
            };
            
            const previewDiv = document.getElementById('preview');
            previewDiv.innerHTML = `<pre style="background:#f8f9fa; padding:10px; border-radius:5px; overflow-x:auto; font-size:12px;">${JSON.stringify(jsonData, null, 2)}</pre>`;
        }
        
        // 监听输入变化
        ['version', 'downloadUrl', 'updateContent', 'announcement'].forEach(id => {
            document.getElementById(id).addEventListener('input', updatePreview);
        });
        
        // 显示状态消息
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type} show`;
            setTimeout(() => {
                statusDiv.classList.remove('show');
            }, 5000);
        }
        
        // ==================== 加载配置 ====================
        async function loadConfig(showManualMessage = true) {
            const tokenInput = document.getElementById('token').value;
            const token = tokenInput || getStoredToken();
            
            if (!token) {
                showStatus('❌ 请输入 GitHub Token', 'error');
                return;
            }
            
            // 保存到 sessionStorage（如果用户输入了新的）
            if (tokenInput) {
                saveTokenToSession(token);
            }
            
            if (showManualMessage) {
                showStatus('🔄 正在加载配置...', 'info');
            } else {
                // 自动加载时显示短暂提示
                showStatus('🔄 自动加载中...', 'info');
                setTimeout(() => {
                    const statusDiv = document.getElementById('status');
                    if (statusDiv.classList.contains('show') && statusDiv.textContent === '🔄 自动加载中...') {
                        statusDiv.classList.remove('show');
                    }
                }, 1000);
            }
            
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`,
                    {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('control.json 文件不存在，将创建新文件');
                    }
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                // ✅ 修复：使用 base64ToUtf8 正确解码中文
                const decoded = base64ToUtf8(data.content);
                const config = JSON.parse(decoded);
                
                // 填充表单
                setFormData({
                    version: config.version || '',
                    downloadUrl: config.downloadUrl || '',
                    updateContent: Array.isArray(config.updateContent) ? config.updateContent.join('\n') : (config.updateContent || ''),
                    announcement: config.announcement || ''
                });
                
                currentSha = data.sha;
                showStatus('✅ 配置加载成功！', 'success');
                
            } catch (error) {
                if (error.message.includes('不存在')) {
                    // 文件不存在，准备创建新文件
                    currentSha = null;
                    setFormData({
                        version: 'v1.0.0',
                        downloadUrl: '',
                        updateContent: '',
                        announcement: ''
                    });
                    showStatus('⚠️ control.json 不存在，保存时将创建新文件', 'info');
                } else {
                    showStatus(`❌ 加载失败: ${error.message}`, 'error');
                    // 如果 Token 无效，清除存储的 Token
                    if (error.message.includes('401') || error.message.includes('403')) {
                        clearToken();
                    }
                }
            }
        }
        
        // ==================== 保存配置 ====================
        async function saveConfig() {
            const token = document.getElementById('token').value || getStoredToken();
            if (!token) {
                showStatus('❌ 请输入 GitHub Token', 'error');
                return;
            }
            
            // 保存 token 以便下次自动加载
            saveTokenToSession(token);
            
            const formData = getFormData();
            
            // 验证必填字段
            if (!formData.version) {
                showStatus('❌ 请填写更新版本', 'error');
                document.getElementById('version').focus();
                return;
            }
            
            if (!formData.downloadUrl) {
                showStatus('❌ 请填写更新链接', 'error');
                document.getElementById('downloadUrl').focus();
                return;
            }
            
            // 构建 JSON 数据
            const jsonData = {
                version: formData.version,
                downloadUrl: formData.downloadUrl,
                updateContent: formData.updateContent.split('\n').filter(line => line.trim()),
                announcement: formData.announcement,
                lastUpdated: new Date().toISOString()
            };
            
            // 验证 JSON 格式
            try {
                JSON.stringify(jsonData);
            } catch (e) {
                showStatus('❌ 数据格式错误，请检查', 'error');
                return;
            }
            
            showStatus('💾 正在保存配置...', 'info');
            
            try {
                // ✅ 使用 utf8ToBase64 正确编码中文
                const content = JSON.stringify(jsonData, null, 2);
                const encodedContent = utf8ToBase64(content);
                
                const requestBody = {
                    message: `更新配置 - ${formData.version}`,
                    content: encodedContent,
                    branch: BRANCH
                };
                
                // 如果是更新现有文件，添加 sha
                if (currentSha) {
                    requestBody.sha = currentSha;
                }
                
                const response = await fetch(
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json',
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify(requestBody)
                    }
                );
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '保存失败');
                }
                
                const result = await response.json();
                currentSha = result.content.sha;
                
                showStatus(`✅ 保存成功！版本 ${formData.version} 已更新`, 'success');
                
                // 重新加载一次以更新 sha（并确保显示最新内容）
                await loadConfig(false);
                
            } catch (error) {
                showStatus(`❌ 保存失败: ${error.message}`, 'error');
            }
        }
        
        // ==================== 自动加载配置（页面加载时调用） ====================
        async function autoLoadConfig() {
            const storedToken = getStoredToken();
            if (storedToken) {
                document.getElementById('token').value = storedToken;
                document.getElementById('tokenStatus').innerHTML = '✓ 已自动加载 Token，正在读取配置...';
                document.getElementById('tokenStatus').style.color = '#28a745';
                await loadConfig(false);
            } else {
                document.getElementById('tokenStatus').innerHTML = '⚠️ 未检测到 Token，请手动输入后点击“手动刷新”';
                document.getElementById('tokenStatus').style.color = '#ffc107';
                showStatus('请先输入 GitHub Token 并点击“手动刷新”加载配置', 'info');
            }
        }
        
        // 页面加载时自动读取配置
        window.addEventListener('DOMContentLoaded', () => {
            updatePreview();
            autoLoadConfig();
        });
        
        // 快捷键支持 (Ctrl/Cmd + Enter 保存)
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                saveConfig();
            }
        });
    </script>
</body>
</html>
