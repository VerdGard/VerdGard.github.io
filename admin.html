<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站配置管理</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        textarea { width: 100%; height: 200px; margin: 10px 0; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .status { margin-top: 10px; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        input { width: 100%; padding: 8px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>control.json 配置管理</h1>
    
    <div>
        <label for="token">GitHub Token:</label>
        <input type="password" id="token" placeholder="输入你的 GitHub Personal Access Token">
        <small style="color: #666;">需要 repo 权限，不会保存到服务器</small>
    </div>
    
    <div>
        <label for="content">control.json 内容:</label>
        <textarea id="content" placeholder="JSON 配置内容..."></textarea>
    </div>
    
    <button onclick="loadConfig()">加载当前配置</button>
    <button onclick="saveConfig()">保存配置</button>
    
    <div id="status" class="status"></div>

    <script>
        // 配置信息
        const REPO_OWNER = 'VerdGard';  // 你的 GitHub 用户名
        const REPO_NAME = 'VerdGard.github.io';  // 仓库名
        const FILE_PATH = 'control.json';  // 要修改的文件路径
        
        // 获取当前配置
        async function loadConfig() {
            const token = document.getElementById('token').value;
            if (!token) {
                showStatus('请输入 GitHub Token', 'error');
                return;
            }
            
            try {
                showStatus('加载中...', '');
                
                const response = await fetch(
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`,
                    {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                // 解码 Base64 内容
                const content = atob(data.content);
                document.getElementById('content').value = content;
                // 保存 SHA 值供后续更新使用
                document.getElementById('content').dataset.sha = data.sha;
                
                showStatus('加载成功！', 'success');
            } catch (error) {
                showStatus(`加载失败: ${error.message}`, 'error');
            }
        }
        
        // 保存配置
        async function saveConfig() {
            const token = document.getElementById('token').value;
            const content = document.getElementById('content').value;
            const sha = document.getElementById('content').dataset.sha;
            
            if (!token) {
                showStatus('请输入 GitHub Token', 'error');
                return;
            }
            
            // 验证 JSON 格式
            try {
                JSON.parse(content);
            } catch (e) {
                showStatus('JSON 格式错误，请检查', 'error');
                return;
            }
            
            try {
                showStatus('保存中...', '');
                
                // Base64 编码内容
                const encodedContent = btoa(unescape(encodeURIComponent(content)));
                
                const response = await fetch(
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json',
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify({
                            message: '通过管理界面更新 control.json',
                            content: encodedContent,
                            sha: sha,
                            branch: 'main'  // 如果是 master 分支，改成 'master'
                        })
                    }
                );
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '保存失败');
                }
                
                const result = await response.json();
                // 更新新的 SHA
                document.getElementById('content').dataset.sha = result.content.sha;
                
                showStatus('保存成功！', 'success');
            } catch (error) {
                showStatus(`保存失败: ${error.message}`, 'error');
            }
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            setTimeout(() => {
                if (type !== 'error') {
                    statusDiv.className = 'status';
                }
            }, 3000);
        }
    </script>
</body>
</html>
